<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>V1K Elite</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

<style>
:root{
  --space-1:8px;
  --space-2:16px;
  --space-3:24px;
  --space-4:32px;
  --space-5:48px;
  --space-6:64px;

  --bg:#FAFAFA;
  --text:#111;
  --muted:#666;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text);
  overflow-x:hidden;
}

/* WEBGL CANVAS */
#bg{
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}

/* NAV */
nav{
  display:flex;
  justify-content:space-between;
  padding:var(--space-2) var(--space-4);
  backdrop-filter:blur(12px);
}

.logo{font-weight:700;}

.btn{
  padding:12px 20px;
  border-radius:999px;
  background:linear-gradient(135deg,#e0e7ff,#c7d2fe);
  cursor:pointer;
  transition:0.3s;
}

/* HERO */
.hero{
  text-align:center;
  padding:var(--space-6) var(--space-3);
}

.hero h1{
  font-size:clamp(36px,6vw,72px);
}

.gradient{
  background:linear-gradient(90deg,#6366f1,#06b6d4);
  -webkit-background-clip:text;
  color:transparent;
}

/* BENTO */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:var(--space-3);
  padding:var(--space-5);
}

.card{
  background:white;
  padding:var(--space-3);
  border-radius:20px;
  transition:transform 0.2s;
  transform-style:preserve-3d;
}

/* CHAT DEMO */
.demo{
  max-width:700px;
  margin:auto;
  background:white;
  padding:var(--space-3);
  border-radius:20px;
}

input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #ddd;
  margin-top:10px;
}

/* CURSOR */
.cursor{
  width:20px;
  height:20px;
  border-radius:50%;
  background:#6366f1;
  position:fixed;
  pointer-events:none;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>
<div class="cursor"></div>

<nav>
  <div class="logo">∧ V1K</div>
  <div class="btn magnet">Try Free →</div>
</nav>

<section class="hero">
  <h1>AI that thinks <span class="gradient">with you.</span></h1>
</section>

<section class="grid">
  <div class="card tilt">🧠 Hybrid Memory</div>
  <div class="card tilt">⚡ Streaming</div>
  <div class="card tilt">📊 Confidence</div>
  <div class="card tilt">🔬 Custom Model</div>
</section>

<section class="demo">
  <b>Ask V1K:</b>
  <input id="input" placeholder="Type something..."/>
  <p id="response"></p>
</section>

<script>

/* ---------------- WEBGL PARTICLES ---------------- */
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
const renderer = new THREE.WebGLRenderer({canvas:document.getElementById("bg"),alpha:true});
renderer.setSize(innerWidth,innerHeight);

const geometry = new THREE.BufferGeometry();
const vertices = [];

for(let i=0;i<1000;i++){
  vertices.push(
    (Math.random()-0.5)*20,
    (Math.random()-0.5)*20,
    (Math.random()-0.5)*20
  );
}

geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices,3));

const material = new THREE.PointsMaterial({size:0.03});
const points = new THREE.Points(geometry,material);
scene.add(points);

camera.position.z = 5;

function animate(){
  requestAnimationFrame(animate);
  points.rotation.y += 0.0005;
  renderer.render(scene,camera);
}
animate();

/* ---------------- CURSOR ---------------- */
const cursor = document.querySelector(".cursor");

document.addEventListener("mousemove", e=>{
  gsap.to(cursor,{
    x:e.clientX,
    y:e.clientY,
    duration:0.2
  });
});

/* ---------------- MAGNETIC BUTTON ---------------- */
document.querySelectorAll(".magnet").forEach(btn=>{
  btn.addEventListener("mousemove", e=>{
    const rect = btn.getBoundingClientRect();
    const x = e.clientX - rect.left - rect.width/2;
    const y = e.clientY - rect.top - rect.height/2;

    gsap.to(btn,{
      x:x*0.2,
      y:y*0.2
    });
  });

  btn.addEventListener("mouseleave",()=>{
    gsap.to(btn,{x:0,y:0});
  });
});

/* ---------------- 3D TILT ---------------- */
document.querySelectorAll(".tilt").forEach(card=>{
  card.addEventListener("mousemove", e=>{
    const rect = card.getBoundingClientRect();
    const x = (e.clientX - rect.left)/rect.width - 0.5;
    const y = (e.clientY - rect.top)/rect.height - 0.5;

    gsap.to(card,{
      rotationY:x*10,
      rotationX:-y*10,
      transformPerspective:500
    });
  });

  card.addEventListener("mouseleave",()=>{
    gsap.to(card,{rotationX:0,rotationY:0});
  });
});

/* ---------------- REAL DEMO ---------------- */
document.getElementById("input").addEventListener("keypress", e=>{
  if(e.key === "Enter"){
    const val = e.target.value;
    const res = document.getElementById("response");

    res.innerHTML = "Thinking...";
    
    setTimeout(()=>{
      res.innerHTML = "def factorial(n): return 1 if n==0 else n*factorial(n-1)";
    },800);
  }
});

</script>

</body>
</html>
