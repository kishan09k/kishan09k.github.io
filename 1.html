<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Search | The Future of Search</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    boxShadow: {
                        'search': '0 4px 20px -2px rgba(0, 0, 0, 0.05)',
                        'search-focus': '0 8px 30px -4px rgba(59, 130, 246, 0.15)'
                    }
                }
            }
        }
    </script>

    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body {
            background-color: #FFFFFF;
            color: #1f2937;
            overflow-x: hidden;
        }
        
        /* Smooth transitions for hiding/showing views */
        .fade-enter {
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.4s ease-out;
        }
        .fade-enter-active {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body class="antialiased min-h-screen flex flex-col">

    <nav class="flex justify-end p-4 md:px-8 items-center gap-4 text-sm font-medium text-gray-600">
        <a href="#" class="hover:text-gray-900 transition-colors">Images</a>
        <a href="#" class="hover:text-gray-900 transition-colors">Mail</a>
        <button class="bg-blue-600 text-white px-4 py-2 rounded-full hover:bg-blue-700 transition-colors shadow-sm">Sign In</button>
    </nav>

    <main id="home-view" class="flex-1 flex flex-col items-center justify-center px-4 -mt-20 fade-enter fade-enter-active">
        
        <h1 class="text-6xl font-bold tracking-tighter mb-8 text-gray-900 flex items-center gap-1">
            <span class="text-blue-600">N</span>
            <span class="text-red-500">e</span>
            <span class="text-yellow-500">x</span>
            <span class="text-blue-600">u</span>
            <span class="text-green-500">s</span>
        </h1>

        <div class="w-full max-w-2xl relative group">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                <i data-lucide="search" class="w-5 h-5 text-gray-400 group-focus-within:text-blue-500 transition-colors"></i>
            </div>
            
            <input 
                type="text" 
                id="search-input"
                class="w-full pl-12 pr-12 py-4 rounded-full border border-gray-200 shadow-search hover:shadow-search-focus focus:shadow-search-focus focus:border-blue-200 outline-none transition-all text-lg"
                placeholder="Search the web or type a URL..."
                autocomplete="off"
            >
            
            <div class="absolute inset-y-0 right-0 pr-4 flex items-center cursor-pointer hover:bg-gray-100 rounded-full my-2 mr-2 px-2 transition-colors">
                <i data-lucide="mic" class="w-5 h-5 text-blue-500"></i>
            </div>
        </div>

        <div class="mt-8 flex gap-4">
            <button id="search-btn" class="bg-gray-50 border border-gray-100 text-gray-700 px-6 py-2.5 rounded-md text-sm hover:border-gray-300 hover:shadow-sm transition-all">
                Nexus Search
            </button>
            <button class="bg-gray-50 border border-gray-100 text-gray-700 px-6 py-2.5 rounded-md text-sm hover:border-gray-300 hover:shadow-sm transition-all">
                I'm Feeling Lucky
            </button>
        </div>
    </main>

    <div id="results-view" class="hidden flex-1 flex-col w-full">
        <header class="flex items-center gap-8 px-6 py-4 border-b border-gray-100 bg-white">
            <h2 class="text-2xl font-bold tracking-tighter text-gray-900">
                <span class="text-blue-600">N</span><span class="text-red-500">e</span><span class="text-yellow-500">x</span><span class="text-blue-600">u</span><span class="text-green-500">s</span>
            </h2>
            
            <div class="flex-1 max-w-3xl relative">
                <input 
                    type="text" 
                    id="results-search-input"
                    class="w-full pl-4 pr-12 py-2.5 rounded-full border border-gray-200 shadow-sm focus:shadow-search-focus outline-none transition-all"
                >
                <button id="close-results" class="absolute inset-y-0 right-0 pr-4 flex items-center text-gray-400 hover:text-gray-600">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
        </header>

        <main class="flex-1 max-w-4xl px-6 py-8 md:px-32">
            <p class="text-sm text-gray-500 mb-6">About 1,420,000,000 results (0.34 seconds)</p>
            
            <div id="dynamic-results" class="space-y-8">
                </div>
        </main>
    </div>

    <footer class="bg-gray-50 border-t border-gray-200 text-sm text-gray-500 py-3 px-6 mt-auto">
        <div class="flex justify-center md:justify-start gap-6">
            <a href="#" class="hover:text-gray-800">About</a>
            <a href="#" class="hover:text-gray-800">Advertising</a>
            <a href="#" class="hover:text-gray-800">Business</a>
            <a href="#" class="hover:text-gray-800">How Search Works</a>
        </div>
    </footer>

    <script>
        // Initialize Icons
        lucide.createIcons();

        // DOM Elements
        const homeView = document.getElementById('home-view');
        const resultsView = document.getElementById('results-view');
        const mainInput = document.getElementById('search-input');
        const resultsInput = document.getElementById('results-search-input');
        const searchBtn = document.getElementById('search-btn');
        const closeResultsBtn = document.getElementById('close-results');
        const resultsContainer = document.getElementById('dynamic-results');

        // Function to handle the search action
        function performSearch(query) {
            if (!query.trim()) return; // Don't search if empty

            // 1. Update the mini search bar with the query
            resultsInput.value = query;

            // 2. Hide Homepage, Show Results Page
            homeView.classList.add('hidden');
            homeView.classList.remove('fade-enter-active');
            
            resultsView.classList.remove('hidden');
            resultsView.classList.add('fade-enter', 'fade-enter-active');

            // 3. Generate Mock Search Results based on the query
            generateMockResults(query);
        }

        // Generate fake results to make it look like it's working
        function generateMockResults(query) {
            resultsContainer.innerHTML = ''; // Clear previous results
            
            const results = [
                {
                    url: `https://www.example.com/${query.replace(/\s+/g, '-')}`,
                    title: `Official site for ${query}`,
                    desc: `Explore the latest information, news, and updates regarding ${query}. Our comprehensive guide covers everything you need to know about this topic.`
                },
                {
                    url: `https://en.wikipedia.org/wiki/${query.replace(/\s+/g, '_')}`,
                    title: `${query} - Wikipedia`,
                    desc: `${query} is a broad topic encompassing various technological and historical aspects. Learn about its origins, development, and impact on modern society.`
                },
                {
                    url: `https://news.nexus.com/topics/${query}`,
                    title: `Breaking News about ${query} today`,
                    desc: `Top stories, opinions, and detailed analysis surrounding ${query}. Stay updated with real-time alerts.`
                }
            ];

            results.forEach(res => {
                const resultHTML = `
                    <div class="max-w-2xl group">
                        <div class="flex items-center gap-2 mb-1">
                            <div class="w-6 h-6 rounded-full bg-gray-200 flex items-center justify-center text-xs font-bold text-gray-500">W</div>
                            <span class="text-sm text-gray-700 truncate">${res.url}</span>
                        </div>
                        <a href="#" class="text-xl text-blue-600 hover:underline mb-1 inline-block">${res.title}</a>
                        <p class="text-sm text-gray-600 leading-relaxed">${res.desc}</p>
                    </div>
                `;
                resultsContainer.insertAdjacentHTML('beforeend', resultHTML);
            });
        }

        // Event Listeners
        searchBtn.addEventListener('click', () => performSearch(mainInput.value));
        
        mainInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') performSearch(mainInput.value);
        });

        resultsInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') performSearch(resultsInput.value);
        });

        // "X" button to go back to homepage
        closeResultsBtn.addEventListener('click', () => {
            resultsView.classList.add('hidden');
            resultsView.classList.remove('fade-enter-active');
            
            homeView.classList.remove('hidden');
            // Slight delay to allow display:block to apply before animating opacity
            setTimeout(() => homeView.classList.add('fade-enter-active'), 10);
            
            mainInput.value = '';
            mainInput.focus();
        });
        
        // Auto-focus the search input on load
        window.onload = () => mainInput.focus();
    </script>
</body>
</html>
